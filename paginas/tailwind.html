<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @layer components {
            .box {
                @apply w-[50px] h-[50px] rounded bg-blue-200
            }

            .avion {
                @apply hover:bg-red-400
            }
        }
    </style>
    <title>Document</title>
</head>

<body>
    <h1 class="text-3xl font-bold underline">
        Hello world!
    </h1>

    <!-- si quieres un valor en específico, usamos corchetes [] -->
    <!-- w-[400px] / text-[#1a1a1a] / p-[10px] -->
    <!-- pseusdo-clase: valor -->
    <p class="text-indigo-400 min-[900px]:text-red hover:text-red-700 hover:bg-slate-400">Lorem ipsum dolor sit
        amet.
    </p>

    <div class="flex gap-[50px] justify-evenly h-2">
        <div class="box avion"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>
</body>

</html>
