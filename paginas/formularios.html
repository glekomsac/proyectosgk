<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <form action="">

          <!-- para escribir texto -->
        <input type="text"> <br>

        <!-- para escribir números -->
        <input type="number"> <br>

        <!-- para escribir contraseñas -->
        <input type="password"> <br>

        <!-- para escribir correos -->
        <input type="email"> <br>

        <!-- para escribir fechas -->
        <input type="date"> <br>

        <!-- para crear botones -->
        <input type="button" value="Registrar">

        <!-- otra forma para crear botones, este es el más moderno para crear botones -->  
        <button>Registrar v2</button>

        <!-- permite enviar la información -->
        <input type="submit" value="Enviar">
    
        <!-- permite resetear o eliminar la información de un formulario -->
        <input type="reset" value="reset">

         <!-- permite agregar información de página web -->
        <input type="url">

        <!-- permite agregar texto largo -->
        <textarea cols="100" rows="10"></textarea>

        <p>Selecciona tu nivel</p>
        <input type="radio" name="nivel"> <span>Nivel 1</span> <br>
        <input type="radio" name="nivel"> <span>Nivel 2</span> <br>
        <input type="radio" name="nivel"> <span>Nivel 3</span> <br>

        <p>selecciona la Categoría</p>
        <input type="checkbox" name="check 1"> <span>Categoría 1</span> <br>
        <input type="checkbox" name="check 2"> <span>Categoría 2</span> <br>
        <input type="checkbox" name="check 3"> <span>Categoría 3</span> <br>

        <select name="Opciones">
            <option value="1"> Opción 1</option>
            <option value="2"> Opción 2</option>
            <option value="3"> Opción 3</option>
            <option value="4"> Opción 4</option>
        </select>



    </form>




</body>
</html>
